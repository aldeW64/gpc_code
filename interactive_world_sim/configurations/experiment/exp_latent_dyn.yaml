defaults:
  - base_pytorch

tasks: [training]

training:
  lr: 8e-5
  precision: 32-true
  batch_size: 1
  max_epochs: -1
  max_steps: 200005
  log_every_n_steps: 10
  checkpointing:
    every_n_train_steps: 10000
  optim:
    gradient_clip_val: 1.0

validation:
  val_every_n_step: 30000
  val_every_n_epoch: null
  batch_size: 8
  limit_batch: 1

test:
  limit_batch: 1
  batch_size: 8

logging:
  metrics:
    - fvd
    # - fid
    # - lpips
