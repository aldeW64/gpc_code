name: real_aloha_from_wm

dataset:
  _name: real_aloha_dataset_for_dp
  dataset_dir: data/sim_aloha/transfer_cube_0301
  horizon: ${horizon}
  skip_frame: 1
  pad_after: 7
  pad_before: 1
  rotation_rep: rotation_6d
  seed: 42
  val_ratio: 0.1
  skip_idx: 20
  use_cache: true
  resolution: 128
  obs_keys: [camera_0_color, camera_1_color]
  low_dim_keys: [joint_pos]
  delta_action: false
  # action_mode: bimanual_push
  action_mode: single_ee
  shape_meta:
    action:
      shape:
      - 4  # A
    obs:
      camera_1_color:
        shape:
        - 3 # C
        - 128 # H
        - 128 # W
        type: rgb

debug: False
shape_meta: ${dataset.shape_meta}
exp_name: "default"

horizon: 3
n_obs_steps: 1
n_action_steps: 3
n_latency_steps: 0
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

# dataset_obs_steps: 2

policy:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    # beta_schedule is important
    # this is the best we found
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    prediction_type: epsilon # or sample
    variance_type: fixed_small

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}
  # crop_shape: [76, 76] # 84x84 90%
  crop_shape:
  - ${eval:'int(${dataset.resolution}*0.9)'}
  - ${eval:'int(${dataset.resolution}*0.9)'}
  # crop_shape: null
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  obs_encoder_group_norm: True
  eval_fixed_crop: True

task:
  dataset: ${dataset}
  image_shape:
  - 3
  - ${dataset.resolution}
  - ${dataset.resolution}
  shape_meta: ${dataset.shape_meta}

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3050
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  # training loop control
  # in epochs
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy
  resume: True
  mode: online
  name: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  tags: ["${name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 5
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs_dp/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs_dp/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
