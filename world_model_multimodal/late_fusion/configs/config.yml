dataset_path: /net/holy-nfsisilon/ifs/rc_labs/ydu_lab/pwu/Projects/gpc_code/dataset/manifeel
models_save_dir: saved_checkpoints_phase2

# Training hyperparameters
num_epochs: 100
# Phase 2: obs_horizon=4, pred_horizon=8 → seq_length = 4 (multi-step autoregressive).
# Run config_phase1.yml first (pred_horizon=5, seq_length=1) for single-step warmup.
obs_horizon: 4
pred_horizon: 8
batch_size: 8
resize_scale: 96      # both RGB and tactile frames are resized to (96 x 96)
lr: 1.0e-4
save_every: 1         # save a checkpoint every N epochs

# Logging
wandb: false

# Phase 2: path to the final Phase-1 checkpoint (late_fusion_denoiser.pth).
# Set to null to train from scratch (not recommended).
phase_one_checkpoint: saved_checkpoints_phase1/checkpoint_epoch_100/late_fusion_denoiser.pth

# Late Fusion loss balance
# loss = loss_alpha * MSE(eps_rgb, target) + (1 - loss_alpha) * MSE(eps_tac, target)
loss_alpha: 0.5

# Inference composition weights [w_rgb, w_tac]
# eps_composed = w_rgb * eps_rgb + w_tac * eps_tac
composition_weights: [0.7, 0.3]

# UNet architecture (shared by both RGB and tactile experts)
cond_channels: 256
depths: [2, 2, 2, 2]
channels: [96, 96, 96, 96]
attn_depths: [0, 0, 1, 1]
