dataset_path: /n/holylabs/ydu_lab/Lab/pwu/Projects/gpc_code/dataset/manifeel/data
models_save_dir: saved_checkpoints_phase1

# Training hyperparameters
num_epochs: 100
# Phase 1: obs_horizon=4, pred_horizon=5 → seq_length = pred_horizon - obs_horizon = 1
# Single-step warmup: the model learns to predict one next frame reliably before
# being exposed to multi-step autoregressive rollout in Phase 2.
obs_horizon: 4
pred_horizon: 5
batch_size: 8
resize_scale: 96
lr: 1.0e-4
save_every: 1

# Logging
wandb: true

# Phase 1 starts from scratch — no checkpoint loading.
phase_one_checkpoint: null

# Late Fusion loss balance (unused in early fusion, kept for config parity)
loss_alpha: 0.5
composition_weights: [0.7, 0.3]

# UNet architecture
cond_channels: 256
depths: [2, 2, 2, 2]
channels: [96, 96, 96, 96]
attn_depths: [0, 0, 1, 1]
