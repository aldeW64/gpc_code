# Early Fusion multimodal world model — training configuration
# ============================================================

# Dataset
dataset_path: /n/holylabs/ydu_lab/Lab/pwu/Projects/gpc_code/dataset/manifeel/data

# Output
models_save_dir: saved_checkpoints_phase2

# Training
num_epochs: 100
batch_size: 8
lr: 1.0e-4

# Phase 2: obs_horizon=4, pred_horizon=8 → seq_length = 4 (multi-step autoregressive).
# Run config_phase1.yml first (pred_horizon=5, seq_length=1) for single-step warmup.
obs_horizon: 4
pred_horizon: 8

# Image resolution (both front RGB and tactile are resized to this square size)
resize_scale: 96

# Logging — set to true to enable Weights & Biases logging
wandb: false

# Phase 2: path to the final Phase-1 checkpoint (denoiser.pth).
# Set to null to train from scratch (not recommended).
phase_one_checkpoint: saved_checkpoints_phase1/checkpoint_epoch_100/denoiser.pth

# Optional: path to a checkpoint directory to resume a mid-run Phase-2 training.
resume_checkpoint: null
